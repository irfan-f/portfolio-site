    <script>
      (function(){var t=localStorage.theme,d=localStorage.darkMode;var dark=(t==="dark")||(t!=="light"&&!(t||d)&&window.matchMedia("(prefers-color-scheme: dark)").matches)||(d==="true");document.documentElement.classList.toggle("dark",dark);var m=document.getElementById("theme-color-meta");if(m)m.setAttribute("content",dark?"#18181b":"#ffffff");})();
    </script>
    <style>
      html { height: 100%; width: 100%; background-color: #ffffff; }
      html.dark { background-color: #18181b; }
      body { min-height: 100%; height: 100%; width: 100%; overflow: hidden; margin: 0; background-color: inherit; transition: background-color 0.25s ease; }
      html { transition: background-color 0.25s ease; }
      #root { height: 100%; min-height: 0; }
      .skip-link { position: fixed; left: 1rem; top: 1rem; z-index: 999; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip-path: inset(50%); white-space: nowrap; border: 0; background: transparent; font: inherit; cursor: pointer; }
      .nav-brand-reveal { overflow: hidden; }
      html:not(.fonts-ready) .nav-brand-reveal { visibility: hidden; }
    </style>
  </head>
  <body>
    <button type="button" class="skip-link">Skip to main content</button>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
