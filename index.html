<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#FBFBFB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#011627" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Site for Irfan Filipovic, detailing software development projects and various other interests."
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <title>Irfan Filipovic</title>
    <script>
      (function(){var t=localStorage.theme,d=localStorage.darkMode;var dark=(t==="dark")||(t!=="light"&&!(t||d)&&window.matchMedia("(prefers-color-scheme: dark)").matches)||(d==="true");document.documentElement.classList.toggle("dark",dark);})();
    </script>
    <style>
      html { height: 100%; width: 100%; background-color: #FBFBFB; }
      html.dark { background-color: #011627; }
      body { min-height: 100%; height: 100%; width: 100%; overflow: hidden; margin: 0; background-color: inherit; transition: background-color 0.2s ease; }
      #root { height: 100%; min-height: 0; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
