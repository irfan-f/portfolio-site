name: "Feature request"
description: "Suggest an idea or improvement."
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problem / motivation"
      description: "What problem are you trying to solve?"
      placeholder: "It’s hard to… because…"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution"
      description: "What would you like to see happen?"
      placeholder: "Add/Change… so that…"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Any other approaches or workarounds?"
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
      description: "How do we know this is done?"
      placeholder: |
        - [ ] …
        - [ ] …
    validations:
      required: false
