name: Deploy
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    name: Build and deploy to Hostinger VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=critical
      - name: Build
        run: npm run build
      - name: Deploy to VPS
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          install -m 600 /dev/stdin ~/.ssh/deploy_key <<< "$SSH_KEY"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            dist/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
