# Portfolio static site — irfan-f.com
# Install: sudo cp deploy/nginx/portfolio-site.conf /etc/nginx/sites-available/portfolio-site
#          sudo ln -sf /etc/nginx/sites-available/portfolio-site /etc/nginx/sites-enabled/
#          sudo mkdir -p /var/www/portfolio-site
#          sudo nginx -t && sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d irfan-f.com -d www.irfan-f.com

server {
    listen 80;
    listen [::]:80;
    server_name irfan-f.com www.irfan-f.com;
    return 301 https://irfan-f.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.irfan-f.com;

    ssl_certificate /etc/letsencrypt/live/irfan-f.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/irfan-f.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://irfan-f.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name irfan-f.com;

    ssl_certificate /etc/letsencrypt/live/irfan-f.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/irfan-f.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/portfolio-site;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
